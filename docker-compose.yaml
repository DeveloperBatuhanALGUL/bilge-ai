version: '3.8'

services:
  bilge-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Kalıcı veriler için yerel klasörleri bağla
      - ./data:/app/data
      - ./logs:/app/logs
      - ./ayarlar:/app/ayarlar
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/durum"]
      interval: 30s
      timeout: 10s
      retries: 3
